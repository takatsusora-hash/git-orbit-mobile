system:
  id: git-orbit-mobile
  name: Git Orbit Mobile
  summary: "This inspector itself, backed by the real GitHub repository."
  tags:
    - live
    - mapped
    - local

repos:
  - owner: takatsusora-hash
    name: git-orbit-mobile
    branch: main

modules:
  - id: app-shell
    name: App Shell
    repo: git-orbit-mobile
    path: app
    type: ui
  - id: ui-components
    name: UI Components
    repo: git-orbit-mobile
    path: components
    type: ui
  - id: snapshot-loader
    name: Snapshot Loader
    repo: git-orbit-mobile
    path: lib/data
    type: api
  - id: github-client
    name: GitHub Client
    repo: git-orbit-mobile
    path: lib/github
    type: service
  - id: snapshot-script
    name: Snapshot Generator
    repo: git-orbit-mobile
    path: scripts
    type: workflow
  - id: system-config
    name: System Config
    repo: git-orbit-mobile
    path: config
    type: service
  - id: status-output
    name: Static Snapshot Output
    repo: git-orbit-mobile
    path: public/data
    type: workflow

connections:
  - from: app-shell
    to: ui-components
    kind: import
    strength: 0.95
  - from: app-shell
    to: snapshot-loader
    kind: api
    strength: 0.88
  - from: snapshot-loader
    to: github-client
    kind: import
    strength: 0.92
  - from: snapshot-script
    to: github-client
    kind: workflow
    strength: 0.86
  - from: snapshot-script
    to: system-config
    kind: workflow
    strength: 0.8
  - from: snapshot-script
    to: status-output
    kind: workflow
    strength: 0.94
